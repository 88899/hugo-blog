<!-- 滚动按钮 -->
<div class="scroll-buttons">
  <button id="scrollToTop" aria-label="滚动到顶部">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 19V5M5 12l7-7 7 7"/>
    </svg>
  </button>
  <button id="scrollToBottom" aria-label="滚动到底部">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12l7 7 7-7"/>
    </svg>
  </button>
</div>

<style>
.scroll-buttons {
  position: fixed;
  right: 1rem;
  bottom: 1rem; /* 与chat按钮紧凑间隔（PC端） */
  display: flex;
  flex-direction: column;
  gap: 0.6rem; /* 内部按钮间隔，视觉协调 */
  z-index: 99;
}

.scroll-buttons button {
  width: 2.5rem;
  height: 2.5rem;
  border-radius: 50%;
  border: none;
  background-color: #28a745;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
  transform: translateY(10px);
  box-shadow: 0 3px 12px rgba(40, 167, 69, 0.4);
}

.scroll-buttons button:hover {
  background-color: #218838;
  transform: translateY(0) scale(1.05);
  box-shadow: 0 4px 15px rgba(40, 167, 69, 0.5);
}

.scroll-buttons button.visible {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

/* 移动端间距优化 */
@media (max-width: 768px) {
  .scroll-buttons {
    right: 1rem !important;
    bottom: 1rem !important; /* 移动端紧凑间隔 */
    gap: 0.5rem !important;
  }

  .scroll-buttons button {
    width: 2.2rem !important;
    height: 2.2rem !important;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const scrollToTopBtn = document.getElementById('scrollToTop');
  const scrollToBottomBtn = document.getElementById('scrollToBottom');

  if (!scrollToTopBtn || !scrollToBottomBtn) {
    return;
  }

  let scrollHandler, clickTopHandler, clickBottomHandler, resizeHandler;
  // WeChat兼容：缓存DOM查询结果
  let documentHeight = document.documentElement.scrollHeight || document.body.scrollHeight;
  let windowHeight = window.innerHeight;

  const initScrollButtons = () => {
    scrollHandler = () => {
      try {
        scrollToTopBtn.classList.toggle('visible', window.pageYOffset > 200);
        const isNearBottom = (windowHeight + window.pageYOffset) >= documentHeight - 100;
        scrollToBottomBtn.classList.toggle('visible', !isNearBottom);
      } catch (e) {
        console.warn('Scroll buttons handler failed:', e);
      }
    };

    clickTopHandler = () => {
      try {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (e) {
        window.scrollTo(0, 0); // 降级处理
      }
    };
    
    clickBottomHandler = () => {
      try {
        window.scrollTo({
          top: documentHeight,
          behavior: 'smooth'
        });
      } catch (e) {
        window.scrollTo(0, documentHeight); // 降级处理
      }
    };

    // WeChat兼容：缓存文档高度变化
    resizeHandler = () => {
      documentHeight = document.documentElement.scrollHeight || document.body.scrollHeight;
      windowHeight = window.innerHeight;
    };

    window.addEventListener('scroll', scrollHandler, { passive: true });
    window.addEventListener('resize', resizeHandler, { passive: true });
    scrollToTopBtn.addEventListener('click', clickTopHandler);
    scrollToBottomBtn.addEventListener('click', clickBottomHandler);
    scrollHandler();
  };

  // 简化清理机制
  const cleanup = () => {
    if (scrollHandler) {
      window.removeEventListener('scroll', scrollHandler);
    }
    if (resizeHandler) {
      window.removeEventListener('resize', resizeHandler);
    }
    if (clickTopHandler) {
      scrollToTopBtn.removeEventListener('click', clickTopHandler);
    }
    if (clickBottomHandler) {
      scrollToBottomBtn.removeEventListener('click', clickBottomHandler);
    }
  };

  // 初始化
  initScrollButtons();

  // 注册到全局清理系统
  if (window.registerCleanup) {
    window.registerCleanup(cleanup);
  }
});
</script>
